name: test-suite
on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  nix-tests:
    name: Run nix tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Nix
        uses: cachix/install-nix-action@v30

      - name: Check Nix Flake
        run: |
          nix flake check

      - name: Run Tests
        run: |
          nix run '.#tests'


  cross-platform-tests:
    name: Run tests on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    defaults:
      run:
        shell: bash
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '21'
      - run: java --version

      - name: Setup Clojure
        uses: DeLaGuardo/setup-clojure@13
        with:
          cli: latest

      - name: Cache
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Rust build and check Cargo.lock
        run: |
          cd rust
          cargo build
          git diff --exit-code Cargo.lock

      - name: Rust tests
        run: |
          cd rust
          cargo test --all-targets

      - name: Cargo publish dry-run
        if: matrix.os == 'ubuntu-latest'
        run: |
          cd rust
          cargo publish --dry-run

      - name: Clojure tests
        run: |
          cd clj
          export PATH=../rust/target/debug:$PATH
          clojure -X:test

      - name: Check Clojure pom.xml
        if: matrix.os == 'ubuntu-latest'
        run: |
          cd clj
          clojure -T:build write-pom
          git diff --exit-code pom.xml

      - name: Check Clojure test pom.xml
        if: matrix.os == 'ubuntu-latest'
        run: |
          cd clj-test
          clojure -T:build write-pom
          git diff --exit-code pom.xml

      - name: Build uberjar
        run: |
          cd clj
          clojure -T:build uber

      - name: Check version from uberjar
        run: |
          VERSION=$(bash ./scripts.dev/get-version.sh)
          java -jar ./clj/target/limabean-${VERSION}-standalone.jar --version >VERSION
          cat VERSION
          test "$(cat VERSION)" == "limabean.clj $VERSION"

      - name: Test uberjar using limabean standalone
        run: |
          VERSION=$(bash ./scripts.dev/get-version.sh)
          export LIMABEAN_UBERJAR="./clj/target/limabean-${VERSION}-standalone.jar"
          unset LIMABEAN_CLJ_LOCAL_ROOT
          export PATH=./rust/target/debug:$PATH
          for golden in test-cases/*.golden/{inventory,journal,rollup}; do
            query=${golden##*/}
            beanfile=${golden%.golden/$query}.beancount
            # rollup is no longer a stand-alone query, must be applied to an inventory
            if test "$query" == rollup; then
              query="rollup (inventory)"
            fi
            echo "Validating $golden"
            limabean -v --beanfile "$beanfile" --eval "(show ($query))" | diff - $golden
          done

  check-jarfile:
    name: Check jarfile
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Clojure
        uses: DeLaGuardo/setup-clojure@13
        with:
          cli: latest

      - name: Build and install jarfile locally
        run: |
          cd clj
          clojure -T:build install

      - name: Check version from jarfile
        run: |
          VERSION=$(bash ./scripts.dev/get-version.sh)
          # this must run *outside* of the clj directory, so we're not relying on its deps.edn for dependency resolution
          clojure -J--enable-native-access=ALL-UNNAMED -Sdeps "{:mvn/local-repo \"$(pwd)/target/m2\" :deps {io.github.tesujimath/limabean {:mvn/version \"$VERSION\"}}}" -M -m limabean.main --version >VERSION
          cat VERSION
          test "$(cat VERSION)" == "limabean.clj $VERSION"

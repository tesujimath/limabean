name: Cross-platform Release

on:
  push:
    tags:
      - "[0-9]*"

permissions:
  contents: write
  packages: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build for ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    defaults:
      run:
        shell: bash
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Verify tag and Cargo version match
        run: |
          VERSION=$(bash ./scripts.dev/get-version.sh)
          TAG=${GITHUB_REF_NAME#v}
          [ "$VERSION" = "$TAG" ]

      - name: Cache
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Run tests
        run: |
          cd rust
          cargo test --all-targets

      - name: Build release
        run: |
          cd rust
          cargo build --release --all-targets

      - name: Package binaries (Unix-like)
        if: runner.os != 'Windows'
        run: |
          mkdir -p release
          cp rust/target/release/{limabean,limabean-pod} release/
          tar czvf limabean-${{ matrix.os }}.tar.gz -C release .

      - name: Package binaries (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          mkdir -p release
          $bins = @(
            "rust\target\release\limabean.exe",
            "rust\target\release\limabean-pod.exe"
          )
          Copy-Item $bins release\
          Compress-Archive -Path release\* -DestinationPath limabean-${{ matrix.os }}.zip

      - name: Upload Rust binaries
        uses: actions/upload-artifact@v6
        with:
          name: limabean-${{ matrix.os }}
          path: |
            limabean-${{ matrix.os }}.tar.gz
            limabean-${{ matrix.os }}.zip

      - name: Setup Clojure
        if: matrix.os == 'ubuntu-latest'
        uses: DeLaGuardo/setup-clojure@13
        with:
          cli: latest

      - name: Deploy application to Clojars
        if: matrix.os == 'ubuntu-latest'
        env:
          CLOJARS_USERNAME: ${{ secrets.LIMABEAN_CLOJARS_USERNAME }}
          CLOJARS_PASSWORD: ${{ secrets.LIMABEAN_CLOJARS_PASSWORD }}
        run: |
          cd clj
          clojure -T:build deploy

      - name: Deploy test library to Clojars
        if: matrix.os == 'ubuntu-latest'
        env:
          CLOJARS_USERNAME: ${{ secrets.LIMABEAN_TEST_CLOJARS_USERNAME }}
          CLOJARS_PASSWORD: ${{ secrets.LIMABEAN_TEST_CLOJARS_PASSWORD }}
        run: |
          cd clj-test
          clojure -T:build deploy

      - name: Build uberjar
        if: matrix.os == 'ubuntu-latest'
        run: |
          cd clj
          clojure -T:build uber
          mv target/limabean-${GITHUB_REF_NAME#v}-standalone.jar ../limabean-standalone.jar

      - name: Upload uberjar
        if: matrix.os == 'ubuntu-latest'
        uses: actions/upload-artifact@v6
        with:
          name: limabean-uberjar
          path: |
            limabean-standalone.jar

      - name: Publish limabean crate
        if: ${{ matrix.os == 'ubuntu-latest' && !contains(github.ref_name, 'SNAPSHOT') }}
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.LIMABEAN_CRATE_DEPLOY_TOKEN }}
        run: |
          cd rust
          cargo publish --package limabean

      - name: Build container image
        if: matrix.os == 'ubuntu-latest'
        id: build-image
        uses: redhat-actions/buildah-build@v2
        with:
          image: ${{ github.event.repository.name }}
          tags: ${{ env.VERSION }} latest
          labels: |
            org.opencontainers.image.source=${{ github.repositoryUrl }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.created=${{ github.event.head_commit.timestamp }}
          build-args: |
            VERSION=${{ env.VERSION }}
          containerfiles: Containerfile

      - name: Display container build outputs
        run: |
          echo "### Container Image :rocket:" >> $GITHUB_STEP_SUMMARY
          echo "Image: ${{ steps.build-image.outputs.image }}" >> $GITHUB_STEP_SUMMARY
          echo "Tags: ${{ steps.build-image.outputs.tags }}" >> $GITHUB_STEP_SUMMARY
          echo "Tagged Image: ${{ steps.build-image.outputs.image-with-tag }}" >> $GITHUB_STEP_SUMMARY

      - name: Push to the Github Container Registry
        id: push-to-ghcr
        uses: redhat-actions/push-to-registry@v2
        with:
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
          image: ${{ steps.build-image.outputs.image }}
          tags: ${{ steps.build-image.outputs.tags }}
          registry: ghcr.io/${{ github.repository_owner }}

      - name: Display container push outputs
        run: |
          echo "Digest: ${{ steps.push-to-ghcr.outputs.digest }}" >> $GITHUB_STEP_SUMMARY
          echo "Registry Paths:" >> $GITHUB_STEP_SUMMARY
          for path in ${{ join(steps.push-to-ghcr.outputs.registry-paths, ' ') }}
          do
            echo "- $path"
          done

  release:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Show files
        run: ls -R dist

      - name: Extract release notes from changelog
        id: changelog
        run: |
          TAG=${GITHUB_REF_NAME#v}

          if [[ "$TAG" == *SNAPSHOT ]]; then
            VERSION="Unreleased"
          else
            VERSION="$TAG"
          fi

          echo "RELEASE_NOTES<<EOF" >> $GITHUB_OUTPUT
          awk -v ver="$VERSION" '
            $0 ~ "^## \\[" ver "\\]" {flag=1; next}
            /^## \[/ {flag=0}
            flag
          ' clj/CHANGELOG.md >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Create Release
        id: release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/**/*
          draft: ${{ contains(github.ref_name, 'SNAPSHOT') }}
          body: ${{ steps.changelog.outputs.RELEASE_NOTES }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Display release outputs
        run: |
          echo "### Release :package:" >> $GITHUB_STEP_SUMMARY
          echo "Link: [${{ steps.release.outputs.id }}](${{ steps.release.outputs.url }})" >> $GITHUB_STEP_SUMMARY
